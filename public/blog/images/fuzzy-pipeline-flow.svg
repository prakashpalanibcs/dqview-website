<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1000" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="roseGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e11d48"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="520" fill="url(#bgGrad)" rx="16"/>
  <rect width="1000" height="520" fill="none" stroke="#1e293b" stroke-width="1" rx="16"/>

  <!-- Title -->
  <text x="500" y="48" text-anchor="middle" fill="#f1f5f9" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700">deKorvai Fuzzy Duplicate Pipeline</text>
  <text x="500" y="72" text-anchor="middle" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="13">End-to-end detection, review, correction, and cleansing</text>

  <!-- Step 1: Fuzzy Matching -->
  <g filter="url(#shadow)">
    <rect x="40" y="110" width="160" height="180" rx="12" fill="#111827" stroke="#059669" stroke-width="2"/>
    <rect x="40" y="110" width="160" height="40" rx="12" fill="url(#emeraldGrad)"/>
    <rect x="40" y="138" width="160" height="12" fill="url(#emeraldGrad)"/>
    <text x="120" y="136" text-anchor="middle" fill="white" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">STEP 1</text>
    <!-- Icon: magnifying glass -->
    <circle cx="100" cy="195" r="14" fill="none" stroke="#10b981" stroke-width="2"/>
    <line x1="110" y1="205" x2="120" y2="215" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="140" cy="195" r="4" fill="#10b981" opacity="0.5"/>
    <text x="120" y="240" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Fuzzy</text>
    <text x="120" y="256" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Matching</text>
    <text x="120" y="278" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">Phonetic + Token</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="200" y1="200" x2="228" y2="200" stroke="#059669" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="228,194 240,200 228,206" fill="#059669"/>

  <!-- Step 2: Report Generation -->
  <g filter="url(#shadow)">
    <rect x="240" y="110" width="160" height="180" rx="12" fill="#111827" stroke="#2563eb" stroke-width="2"/>
    <rect x="240" y="110" width="160" height="40" rx="12" fill="url(#blueGrad)"/>
    <rect x="240" y="138" width="160" height="12" fill="url(#blueGrad)"/>
    <text x="320" y="136" text-anchor="middle" fill="white" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">STEP 2</text>
    <!-- Icon: document -->
    <rect x="300" y="175" width="28" height="36" rx="3" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <line x1="306" y1="186" x2="322" y2="186" stroke="#3b82f6" stroke-width="1.5"/>
    <line x1="306" y1="193" x2="322" y2="193" stroke="#3b82f6" stroke-width="1.5"/>
    <line x1="306" y1="200" x2="316" y2="200" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="320" y="240" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Report</text>
    <text x="320" y="256" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Generation</text>
    <text x="320" y="278" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">Clusters + Scores</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="400" y1="200" x2="428" y2="200" stroke="#2563eb" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="428,194 440,200 428,206" fill="#2563eb"/>

  <!-- Step 3: Review & Approval -->
  <g filter="url(#shadow)">
    <rect x="440" y="110" width="160" height="180" rx="12" fill="#111827" stroke="#d97706" stroke-width="2"/>
    <rect x="440" y="110" width="160" height="40" rx="12" fill="url(#amberGrad)"/>
    <rect x="440" y="138" width="160" height="12" fill="url(#amberGrad)"/>
    <text x="520" y="136" text-anchor="middle" fill="white" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">STEP 3</text>
    <!-- Icon: checkmark in circle -->
    <circle cx="520" cy="195" r="16" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <polyline points="510,195 517,202 530,189" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="520" y="240" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Review &amp;</text>
    <text x="520" y="256" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Approval</text>
    <text x="520" y="278" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">Golden Record</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="600" y1="200" x2="628" y2="200" stroke="#d97706" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="628,194 640,200 628,206" fill="#d97706"/>

  <!-- Step 4: Transaction Correction -->
  <g filter="url(#shadow)">
    <rect x="640" y="110" width="160" height="180" rx="12" fill="#111827" stroke="#7c3aed" stroke-width="2"/>
    <rect x="640" y="110" width="160" height="40" rx="12" fill="url(#purpleGrad)"/>
    <rect x="640" y="138" width="160" height="12" fill="url(#purpleGrad)"/>
    <text x="720" y="136" text-anchor="middle" fill="white" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">STEP 4</text>
    <!-- Icon: arrows swap -->
    <line x1="705" y1="185" x2="735" y2="185" stroke="#8b5cf6" stroke-width="2"/>
    <polygon points="731,180 739,185 731,190" fill="#8b5cf6"/>
    <line x1="735" y1="205" x2="705" y2="205" stroke="#8b5cf6" stroke-width="2"/>
    <polygon points="709,200 701,205 709,210" fill="#8b5cf6"/>
    <text x="720" y="240" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Transaction</text>
    <text x="720" y="256" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Correction</text>
    <text x="720" y="278" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">PO/SO Re-map</text>
  </g>

  <!-- Arrow 4→5 -->
  <line x1="800" y1="200" x2="828" y2="200" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="828,194 840,200 828,206" fill="#7c3aed"/>

  <!-- Step 5: Master Data Cleansing -->
  <g filter="url(#shadow)">
    <rect x="840" y="110" width="130" height="180" rx="12" fill="#111827" stroke="#e11d48" stroke-width="2"/>
    <rect x="840" y="110" width="130" height="40" rx="12" fill="url(#roseGrad)"/>
    <rect x="840" y="138" width="130" height="12" fill="url(#roseGrad)"/>
    <text x="905" y="136" text-anchor="middle" fill="white" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">STEP 5</text>
    <!-- Icon: sparkle/clean -->
    <path d="M905 185 L908 195 L918 198 L908 201 L905 211 L902 201 L892 198 L902 195 Z" fill="#f43f5e"/>
    <circle cx="918" cy="185" r="3" fill="#f43f5e" opacity="0.6"/>
    <text x="905" y="240" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Master Data</text>
    <text x="905" y="256" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Cleansing</text>
    <text x="905" y="278" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">Golden + Delete</text>
  </g>

  <!-- Bottom section: Two use cases -->
  <rect x="40" y="330" width="440" height="150" rx="12" fill="#111827" stroke="#1e293b" stroke-width="1.5"/>
  <rect x="40" y="330" width="440" height="36" rx="12" fill="#0f172a"/>
  <rect x="40" y="354" width="440" height="12" fill="#0f172a"/>
  <circle cx="60" cy="350" r="8" fill="#059669"/>
  <text x="75" y="354" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">Operational Excellence (Continuous)</text>
  <text x="60" y="388" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11.5">Catch duplicates at the point of creation</text>
  <text x="60" y="408" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11.5">Prevent propagation into POs and Sales Orders</text>
  <text x="60" y="428" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11.5">Consolidate procurement spend automatically</text>
  <text x="60" y="448" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11.5">Maintain clean financial reporting continuously</text>
  <text x="60" y="470" fill="#10b981" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">Result: Ongoing governance, zero data debt accumulation</text>

  <rect x="520" y="330" width="450" height="150" rx="12" fill="#111827" stroke="#1e293b" stroke-width="1.5"/>
  <rect x="520" y="330" width="450" height="36" rx="12" fill="#0f172a"/>
  <rect x="520" y="354" width="450" height="12" fill="#0f172a"/>
  <circle cx="540" cy="350" r="8" fill="#3b82f6"/>
  <text x="555" y="354" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">S/4HANA Transformation (Pre-Migration Gate)</text>
  <text x="540" y="388" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11.5">Cleanse duplicates before DMC staging</text>
  <text x="540" y="408" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11.5">Resolve BP conflicts prior to conversion</text>
  <text x="540" y="428" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11.5">Fix open PO/SO references before cutover</text>
  <text x="540" y="448" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11.5">Achieve 95%+ DMC simulation pass rate</text>
  <text x="540" y="470" fill="#3b82f6" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">Result: Predictable migration, weeks saved per mock cycle</text>

  <!-- Subtle grid dots -->
  <g opacity="0.05">
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="white"/>
    </pattern>
    <rect width="1000" height="520" fill="url(#dots)"/>
  </g>
</svg>
