<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1000" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="480" fill="url(#bg2)" rx="16"/>
  <rect width="1000" height="480" fill="none" stroke="#1e293b" stroke-width="1" rx="16"/>

  <!-- Title -->
  <text x="500" y="42" text-anchor="middle" fill="#f1f5f9" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700">How Fuzzy Matching Catches What Exact Match Misses</text>

  <!-- Left: Exact Match -->
  <g filter="url(#shadow2)">
    <rect x="40" y="70" width="430" height="380" rx="12" fill="#111827" stroke="#ef4444" stroke-width="1.5" stroke-opacity="0.6"/>
  </g>
  <rect x="40" y="70" width="430" height="38" rx="12" fill="#1e293b"/>
  <rect x="40" y="96" width="430" height="12" fill="#1e293b"/>
  <circle cx="62" cy="90" r="6" fill="#ef4444"/>
  <text x="78" y="94" fill="#fca5a5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">Exact Match — Misses Duplicates</text>

  <!-- Record pair 1 -->
  <rect x="60" y="120" width="390" height="56" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="76" y="142" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600">RECORD A</text>
  <text x="76" y="164" fill="#e2e8f0" font-family="monospace" font-size="12">Ball Bearing 6205-2RS SKF</text>
  <rect x="340" y="134" width="96" height="24" rx="12" fill="#1c1917" stroke="#ef4444" stroke-width="1"/>
  <text x="388" y="150" text-anchor="middle" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700">NO MATCH</text>

  <rect x="60" y="184" width="390" height="56" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="76" y="206" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600">RECORD B</text>
  <text x="76" y="228" fill="#e2e8f0" font-family="monospace" font-size="12">Bearing, Ball 6205 2RS (SKF)</text>

  <text x="255" y="265" text-anchor="middle" fill="#6b7280" font-family="Inter, system-ui, sans-serif" font-size="11" font-style="italic">Strings are different → exact match says "not a duplicate"</text>

  <!-- Record pair 2 -->
  <rect x="60" y="286" width="390" height="56" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="76" y="308" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600">RECORD C</text>
  <text x="76" y="330" fill="#e2e8f0" font-family="monospace" font-size="12">Müller GmbH &amp; Co. KG</text>
  <rect x="340" y="300" width="96" height="24" rx="12" fill="#1c1917" stroke="#ef4444" stroke-width="1"/>
  <text x="388" y="316" text-anchor="middle" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700">NO MATCH</text>

  <rect x="60" y="350" width="390" height="56" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="76" y="372" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600">RECORD D</text>
  <text x="76" y="394" fill="#e2e8f0" font-family="monospace" font-size="12">Mueller GmbH Co KG</text>

  <text x="255" y="430" text-anchor="middle" fill="#6b7280" font-family="Inter, system-ui, sans-serif" font-size="11" font-style="italic">Umlaut + abbreviation differences → invisible to exact match</text>

  <!-- Right: Fuzzy Match -->
  <g filter="url(#shadow2)">
    <rect x="530" y="70" width="430" height="380" rx="12" fill="#111827" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.6"/>
  </g>
  <rect x="530" y="70" width="430" height="38" rx="12" fill="#1e293b"/>
  <rect x="530" y="96" width="430" height="12" fill="#1e293b"/>
  <circle cx="552" cy="90" r="6" fill="#10b981"/>
  <text x="568" y="94" fill="#6ee7b7" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">deKorvai Fuzzy Match — Catches All</text>

  <!-- Fuzzy pair 1 -->
  <rect x="550" y="120" width="390" height="56" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="566" y="142" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600">RECORD A</text>
  <text x="566" y="164" fill="#e2e8f0" font-family="monospace" font-size="12"><tspan fill="#10b981">Ball Bearing</tspan> <tspan fill="#10b981">6205</tspan>-<tspan fill="#10b981">2RS</tspan> <tspan fill="#10b981">SKF</tspan></text>
  <rect x="830" y="134" width="96" height="24" rx="12" fill="#052e16" stroke="#10b981" stroke-width="1"/>
  <text x="878" y="150" text-anchor="middle" fill="#10b981" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700">92% MATCH</text>

  <rect x="550" y="184" width="390" height="56" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="566" y="206" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600">RECORD B</text>
  <text x="566" y="228" fill="#e2e8f0" font-family="monospace" font-size="12"><tspan fill="#10b981">Bearing</tspan>, <tspan fill="#10b981">Ball</tspan> <tspan fill="#10b981">6205</tspan> <tspan fill="#10b981">2RS</tspan> (<tspan fill="#10b981">SKF</tspan>)</text>

  <!-- Connection line -->
  <line x1="640" y1="176" x2="640" y2="184" stroke="#10b981" stroke-width="1.5" stroke-dasharray="3,2"/>

  <text x="745" y="265" text-anchor="middle" fill="#6ee7b7" font-family="Inter, system-ui, sans-serif" font-size="11" font-style="italic">Token matching: same tokens, different order → duplicate!</text>

  <!-- Fuzzy pair 2 -->
  <rect x="550" y="286" width="390" height="56" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="566" y="308" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600">RECORD C</text>
  <text x="566" y="330" fill="#e2e8f0" font-family="monospace" font-size="12"><tspan fill="#10b981">Müller</tspan> <tspan fill="#10b981">GmbH</tspan> &amp; Co. <tspan fill="#10b981">KG</tspan></text>
  <rect x="830" y="300" width="96" height="24" rx="12" fill="#052e16" stroke="#10b981" stroke-width="1"/>
  <text x="878" y="316" text-anchor="middle" fill="#10b981" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700">96% MATCH</text>

  <rect x="550" y="350" width="390" height="56" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="566" y="372" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600">RECORD D</text>
  <text x="566" y="394" fill="#e2e8f0" font-family="monospace" font-size="12"><tspan fill="#10b981">Mueller</tspan> <tspan fill="#10b981">GmbH</tspan> Co <tspan fill="#10b981">KG</tspan></text>

  <line x1="640" y1="342" x2="640" y2="350" stroke="#10b981" stroke-width="1.5" stroke-dasharray="3,2"/>

  <text x="745" y="430" text-anchor="middle" fill="#6ee7b7" font-family="Inter, system-ui, sans-serif" font-size="11" font-style="italic">Phonetic + normalization: ü→ue, &amp; Co.→Co → duplicate!</text>

  <!-- Subtle grid -->
  <g opacity="0.04">
    <pattern id="dots2" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="white"/>
    </pattern>
    <rect width="1000" height="480" fill="url(#dots2)"/>
  </g>
</svg>
