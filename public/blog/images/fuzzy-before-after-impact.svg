<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1000" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" fill="url(#bg3)" rx="16"/>
  <rect width="1000" height="500" fill="none" stroke="#1e293b" stroke-width="1" rx="16"/>

  <!-- Title -->
  <text x="500" y="42" text-anchor="middle" fill="#f1f5f9" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700">The Impact of Fuzzy Duplicates on SAP Operations</text>

  <!-- LEFT: Before deKorvai -->
  <g filter="url(#shadow3)">
    <rect x="40" y="65" width="440" height="400" rx="12" fill="#111827" stroke="#ef4444" stroke-width="1.5" stroke-opacity="0.5"/>
  </g>
  <rect x="40" y="65" width="440" height="36" rx="12" fill="#7f1d1d"/>
  <rect x="40" y="89" width="440" height="12" fill="#7f1d1d"/>
  <text x="260" y="89" text-anchor="middle" fill="#fecaca" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">WITHOUT Fuzzy Duplicate Detection</text>

  <!-- Pain point cards -->
  <rect x="60" y="114" width="400" height="62" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="78" y="136" fill="#f87171" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800">5-15%</text>
  <text x="160" y="136" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">of master data records are redundant duplicates</text>
  <text x="78" y="156" fill="#6b7280" font-family="Inter, system-ui, sans-serif" font-size="11">Accumulated over years of decentralized data entry across plants</text>

  <rect x="60" y="184" width="400" height="62" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="78" y="206" fill="#f87171" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800">30-40%</text>
  <text x="172" y="206" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">DMC simulation rejection rate (first run)</text>
  <text x="78" y="226" fill="#6b7280" font-family="Inter, system-ui, sans-serif" font-size="11">Duplicate master data causes cascading migration load failures</text>

  <rect x="60" y="254" width="400" height="62" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="78" y="276" fill="#f87171" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800">2-3 wks</text>
  <text x="182" y="276" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">added per mock cycle for rework</text>
  <text x="78" y="296" fill="#6b7280" font-family="Inter, system-ui, sans-serif" font-size="11">Each failed load cycle requires manual investigation and re-extraction</text>

  <rect x="60" y="324" width="400" height="62" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="78" y="346" fill="#f87171" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800">Millions</text>
  <text x="174" y="346" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">in lost procurement volume savings</text>
  <text x="78" y="366" fill="#6b7280" font-family="Inter, system-ui, sans-serif" font-size="11">Duplicate materials = fragmented POs = no volume consolidation</text>

  <rect x="60" y="394" width="400" height="56" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="78" y="416" fill="#f87171" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800">Audit risk</text>
  <text x="188" y="416" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">from fragmented vendor spend reports</text>
  <text x="78" y="436" fill="#6b7280" font-family="Inter, system-ui, sans-serif" font-size="11">Same vendor under 3 names = compliance gaps in single-vendor reporting</text>

  <!-- RIGHT: After deKorvai -->
  <g filter="url(#shadow3)">
    <rect x="520" y="65" width="440" height="400" rx="12" fill="#111827" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.5"/>
  </g>
  <rect x="520" y="65" width="440" height="36" rx="12" fill="#052e16"/>
  <rect x="520" y="89" width="440" height="12" fill="#052e16"/>
  <text x="740" y="89" text-anchor="middle" fill="#a7f3d0" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">WITH deKorvai Fuzzy Detection Pipeline</text>

  <!-- Success cards -->
  <rect x="540" y="114" width="400" height="62" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="558" y="136" fill="#34d399" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800">95%+</text>
  <text x="630" y="136" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">DMC simulation pass rate on first attempt</text>
  <text x="558" y="156" fill="#6b7280" font-family="Inter, system-ui, sans-serif" font-size="11">Pre-migration quality gate eliminates duplicate-related failures</text>

  <rect x="540" y="184" width="400" height="62" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="558" y="206" fill="#34d399" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800">Same-day</text>
  <text x="680" y="206" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">feedback loop for duplicate review</text>
  <text x="558" y="226" fill="#6b7280" font-family="Inter, system-ui, sans-serif" font-size="11">Automated routing to data stewards with actionable reports</text>

  <rect x="540" y="254" width="400" height="62" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="558" y="276" fill="#34d399" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800">70%</text>
  <text x="612" y="276" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">reduction in migration rework cycles</text>
  <text x="558" y="296" fill="#6b7280" font-family="Inter, system-ui, sans-serif" font-size="11">Clean data enters DMC staging → fewer load-fix-reload iterations</text>

  <rect x="540" y="324" width="400" height="62" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="558" y="346" fill="#34d399" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800">100%</text>
  <text x="624" y="346" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">PO/SO transactional data corrected</text>
  <text x="558" y="366" fill="#6b7280" font-family="Inter, system-ui, sans-serif" font-size="11">Open orders auto-remapped to golden records within the pipeline</text>

  <rect x="540" y="394" width="400" height="56" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="558" y="416" fill="#34d399" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800">Audit-ready</text>
  <text x="688" y="416" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">traceability for every decision</text>
  <text x="558" y="436" fill="#6b7280" font-family="Inter, system-ui, sans-serif" font-size="11">Full audit trail: detection → review → approval → correction → cleanse</text>

  <!-- VS divider -->
  <circle cx="500" cy="265" r="22" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="500" y="271" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800">VS</text>

  <!-- Subtle grid -->
  <g opacity="0.04">
    <pattern id="dots3" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="white"/>
    </pattern>
    <rect width="1000" height="500" fill="url(#dots3)"/>
  </g>
</svg>
